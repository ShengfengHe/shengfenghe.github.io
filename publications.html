function escapeAttr(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function normalizeImage(image, index) {
  if (typeof image === "string") {
    return { src: image };
  }
  return image || {};
}

function renderPubImage(image, index) {
  const img = normalizeImage(image, index);
  const height = img.height || (index === 0 ? 100 : 40);
  const radius = img.radius || 10;
  const style = img.style || `border-radius: ${radius}px; max-height: ${height}px; object-fit: cover;`;
  const href = img.href ? ` href="${escapeAttr(img.href)}"` : "";
  const target = img.href ? ` target="${escapeAttr(img.target || "_blank")}"` : "";
  const srcset = img.srcset ? ` srcset="${escapeAttr(img.srcset)}"` : "";
  const alt = img.alt || (index === 0 ? "snapshot" : "logo");
  return `
    <div class="pub-image-wrap qfy-element bitImageControlDiv">
      <a class="bitImageAhover"${href}${target}>
        <div class="bitImageParentDiv qfe_single_image qfe_content_element widthfull vc_align_center">
          <div class="qfe_wrapper"><span></span><img class="front_image ag_image" src="${escapeAttr(img.src)}"${srcset} alt="${escapeAttr(alt)}" style="${escapeAttr(style)}" /></div>
        </div>
      </a>
    </div>`;
}

function renderLinks(links) {
  if (!links) return "";
  const entries = Array.isArray(links) ? links : Object.entries(links);
  if (!entries.length) return "";
  return entries
    .map(link => {
      const label = link[0];
      const url = link[1];
      if (!url) return `[<span style="font-size: 15px;">${label}</span>]`;
      return `[<a href="${escapeAttr(url)}" rel="" target="_blank"><span style="font-size: 15px;">${label}</span></a>]`;
    })
    .join(" ");
}

function renderPublicationInfo(pub) {
  const linkHtml = renderLinks(pub.links);
  const noteHtml = pub.notes && pub.notes.length
    ? pub.notes.map(note => `<div><span style="font-size: 15px; color: rgb(226, 80, 65);">${note}</span></div>`).join("")
    : "";
  return `
    <h2><span style="font-size: 15px;">${pub.title}</span></h2>
    <div><span style="font-size: 15px;"><em>${pub.authors}</em></span></div>
    <div><span style="font-size: 15px;">${pub.venue}</span></div>
    ${noteHtml}
    ${linkHtml ? `<div><span style="font-size: 15px;">${linkHtml}</span></div>` : ""}`;
}

function renderYearHeading(year) {
  return `<div class="pub-year-heading"><span>${year}</span></div>`;
}

function renderPublication(pub) {
  return `
<section class="pub-record section bothfull section-text-no-shadow section-inner-no-shadow section-normal section-orgi">
  <div class="container">

      <div class="pub-image-col qfy-column-inner vc_span_class vc_span6 text-default small-screen-default notfullrow">
        <div class="column_inner"><div class="column_containter">
          ${(pub.image || []).map(renderPubImage).join("")}
        </div></div>
      </div>
      <div class="pub-info-col qfy-column-inner vc_span_class vc_span6 text-default small-screen-default notfullrow">
        <div class="column_inner"><div class="column_containter">
          <div class="pub-info qfy-element qfy-text qfe_text_column qfe_content_element"><div class="qfe_wrapper">${renderPublicationInfo(pub)}</div></div>
        </div></div>
      </div>
      <div class="wf-mobile-hidden qfy-clumn-clear" style="clear:both;"></div>
    </div>
  </div>
</section>`;
}

(function renderPublicationRecords() {

})();
